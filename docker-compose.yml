services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret123
      MONGO_INITDB_DATABASE: attendance
    volumes:
      - mongo_data:/data/db
    networks:
      - attendance-net

  backend:
    image: ${DOCKERHUB_USERNAME}/attendance-backend:latest
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:secret123@mongo:27017/attendance?authSource=admin
      JWT_SECRET: supersecretjwtkey
      PORT: 5000
    depends_on:
      - mongo
    networks:
      - attendance-net

  frontend:
    image: ${DOCKERHUB_USERNAME}/attendance-frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - attendance-net

volumes:
  mongo_data:

networks:
  attendance-net:
    driver: bridge