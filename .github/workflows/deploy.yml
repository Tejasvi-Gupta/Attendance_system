name: Build and Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ✅ Build frontend (NO CACHE)
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          no-cache: true 
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-frontend:${{ github.sha }}

      # ✅ Build backend 
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          no-cache: true   
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Attendance_system

            # 🔥 Clean old images 
            docker system prune -af

            # 🔥 Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/attendance-frontend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend:latest

            # 🔥 Restart containers properly
            docker compose down
            docker compose up -d --build